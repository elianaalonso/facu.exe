<!DOCTYPE html>
<html lang="es" class="scroll-smooth bg-[#0A0A0C] text-[#F8FAFC]">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FACU.EXE // SYSTEM RUNTIME</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
      <link rel="stylesheet" href="style.css">


  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            mono: ['"Fira Code"', 'monospace'],
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            brand: {
              bg: '#0A0A0C',
              surface: '#0F0F13',
              indigo: '#4F46E5',
              blueSteel: '#3B82F6',
              emerald: '#10B981',
              slate: '#94A3B8',
              border: 'rgba(255, 255, 255, 0.08)',
            }
          }
        }
      }
    }
  </script>

  <style>
    /* Minimal overrides to match dark aesthetic locally */
    body { font-family: Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Fira Code', monospace; }
    .scrollbar-thin::-webkit-scrollbar { height:8px; width:8px }
    /* Glow effects for login container */
    #login-container{transition:box-shadow .32s ease,border-color .32s ease}
    #login-container.glow-success{box-shadow:0 30px 60px rgba(79,70,229,0.12),0 0 0 6px rgba(16,185,129,0.06);border-color:rgba(16,185,129,0.35)}
    #login-container.glow-error{box-shadow:0 20px 40px rgba(239,68,68,0.12),0 0 0 6px rgba(239,68,68,0.06);border-color:rgba(239,68,68,0.45)}
    /* Floating video placeholders on welcome */
    #floating-videos{position:absolute;inset:0;pointer-events:none}
    .floating-item{position:absolute;width:160px;height:100px;border-radius:12px;overflow:hidden;background:linear-gradient(135deg,#0f1724 0%, #0b0c0f 100%);border:1px solid rgba(255,255,255,0.04);box-shadow:0 6px 30px rgba(3,7,18,0.6);display:flex;align-items:center;justify-content:center;pointer-events:auto;cursor:pointer;transition:transform .24s ease,box-shadow .24s ease}
    .floating-item .thumb{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:#94a3b8;font-family:monospace;font-size:12px}
    .floating-item:hover{transform:translateY(-8px) scale(1.03);box-shadow:0 18px 50px rgba(79,70,229,0.12)}
    /* large floating variants for full panel */
    .floating-big{border-radius:14px;width:520px;height:320px;min-width:360px;min-height:220px}
    .floating-big .thumb{font-size:14px;color:#cbd5e1}
    @keyframes floaty{0%{transform:translateY(0)}50%{transform:translateY(-12px)}100%{transform:translateY(0)}}
    .floating-anim{animation:floaty 6s ease-in-out infinite}
    /* Big celebratory headline */
    #welcome-celebrate{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
    #welcome-celebrate h2{font-family:Inter, sans-serif;font-weight:700;letter-spacing:.12em;color:transparent;background:linear-gradient(90deg,#4F46E5,#3B82F6);-webkit-background-clip:text;font-size:48px;text-align:center;text-transform:uppercase;text-shadow:0 6px 30px rgba(59,130,246,0.06)}
    /* Collage / mosaic styles */
    .collage-root{ position:fixed; inset:0; background:#000; overflow:hidden }
    .collage-area{ position:absolute; inset:0 }

    .video-tile{
      position:absolute;
      object-fit:cover;
      border-radius:14px;
      opacity:0.88;
      filter:brightness(.86);
      box-shadow:0 18px 60px rgba(0,0,0,0.6);
      pointer-events:none;
      transition:transform .35s ease;
      will-change:transform, left, top;
      animation:floaty 8s ease-in-out infinite;
    }

    .bg-video{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; z-index:0; filter:blur(8px) brightness(.6); opacity:0.96 }

      .single-video{ top:6%; right:6%; width:30vw; max-width:420px; border-radius:16px; box-shadow:0 24px 80px rgba(0,0,0,0.6); z-index:50; object-fit:cover }
      .single-video.rotated{ transform:rotate(90deg); transform-origin:center; }

    .hero-content{ position:absolute; z-index:40; left:50%; top:50%; transform:translate(-50%,-50%); text-align:center; backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px); background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.08); padding:28px 40px; border-radius:20px }
    .hero-content h1{ font-size:3.2rem; margin:0 0 8px }
    .hero-content h2{ margin:0 0 8px; font-size:1.1rem }
    .hero-content p{ color:#b0b0b0; margin:0 }

    @keyframes floaty{ 0%{transform:translateY(0)}50%{transform:translateY(-12px)}100%{transform:translateY(0)} }
  </style>
</head>
<body class="overflow-hidden h-screen select-none bg-[#000] text-[#F8FAFC] transition-colors duration-1000">
  <!-- Minimal collage-only layout: everything else removed per request -->
  <div class="collage-root">
    <video id="bg-video" class="bg-video" muted autoplay playsinline loop preload="auto"></video>
    <div id="collage-area" class="collage-area"></div>
    <div class="hero-content" style="display:none;">
      <h1>v1.8</h1>
      <h2>Felices 18 meses</h2>
      <p>547 días después, sigo pensando que fue una buena idea.</p>
    </div>
  </div>
  <div id="debug-msg" style="position:fixed;left:12px;bottom:12px;z-index:9999;background:rgba(0,0,0,0.6);color:#fff;padding:8px 12px;border-radius:8px;font-size:13px;max-width:40%;display:none"></div>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>lucide.createIcons();</script>

  <script>
    // Show a single video (IMG_0679) top-right and remove others per user's request
    (function(){
      const area = document.getElementById('collage-area'); if(!area) return;
      function clearArea(){ area.innerHTML=''; }
      clearArea();
      const single = document.createElement('video');
      single.className = 'single-video'; single.muted = true; single.autoplay = true; single.loop = true; single.playsInline = true; single.preload='auto';
      single.src = 'videos/IMG_0679.MP4';
      single.id = 'vid-0679'; single.classList.add('vid-0679');
      const v2 = document.createElement('video');
      v2.className = 'single-video'; v2.muted=true; v2.autoplay=true; v2.loop=true; v2.playsInline=true; v2.preload='auto';
      v2.src = 'videos/IMG_3839.MP4';
      v2.id = 'vid-3839'; v2.classList.add('vid-3839');
      // rotate this one 90deg as requested and slightly narrower so it fits visually
      v2.classList.add('rotated');
      v2.style.width = '18vw';
      // ensure background also uses a frame (optional)
      try{ const bg = document.getElementById('bg-video'); if(bg) bg.src = 'videos/IMG_0679.MP4'; }catch(e){}
      area.appendChild(single);
      area.appendChild(v2);
      // add IMG_9141 to the right of the previous videos
      const v3 = document.createElement('video');
      v3.className = 'single-video'; v3.muted=true; v3.autoplay=true; v3.loop=true; v3.playsInline=true; v3.preload='auto';
      v3.src = 'videos/IMG_9141.MP4';
      v3.id = 'vid-9141'; v3.classList.add('vid-9141');
      // make it slightly smaller so it fits well to the right
      area.appendChild(v3);
      single.play().catch(()=>{});
      v2.play().catch(()=>{});
      v3.play().catch(()=>{});
    })();
  </script>

  </body>
</html>
